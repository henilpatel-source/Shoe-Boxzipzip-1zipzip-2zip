<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoe Box — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    .login-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-wrap img {
      height: 60px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .logo-wrap h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo-wrap h1 span { color: #e53935; }

    .login-card h2 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
      color: #aaa;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #e53935; }

    .error-msg {
      background: rgba(229,57,53,0.15);
      border: 1px solid #e53935;
      color: #ff6b6b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: #c62828; }
    .btn-login:active { transform: scale(0.98); }

    /* ── ADMIN CONTENT ── */
    #admin-page {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: column;
    }

    .admin-topbar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-topbar span {
      color: #aaa;
      font-size: 13px;
    }

    .admin-topbar strong { color: #e53935; }

    .btn-logout {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: #e53935; border-color: #e53935; }

    #admin-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: calc(100vh - 53px);
    }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="login-card">
      <div class="logo-wrap">
        <img src="./images/logo.png" onerror="this.style.display='none'" alt="Shoe Box" />
        <h1>SHOE <span>BOX</span></h1>
      </div>
      <h2>Admin Panel Login</h2>
      <div class="error-msg" id="error-msg">Invalid username or password.</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>
      <button class="btn-login" onclick="doLogin()">LOGIN</button>
    </div>
  </div>

  <!-- ADMIN CONTENT (shown after login) -->
  <div id="admin-page">
    <div class="admin-topbar">
      <span>Logged in as <strong>shoebox</strong></span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <script>
    const ADMIN_USER = 'shoebox';
    const ADMIN_PASS = 'Shoebox@1525';
    const SESSION_KEY = 'sb_admin_auth';

    function checkSession() {
      if (sessionStorage.getItem(SESSION_KEY) === 'true') {
        window.location.replace('/admin');
      }
    }

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem(SESSION_KEY, 'true');
        err.style.display = 'none';
        window.location.replace('/admin');
      } else {
        err.style.display = 'block';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    checkSession();
  </script>

</body>
</html>
